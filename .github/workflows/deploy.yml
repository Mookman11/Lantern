name: Deploy Static Mirror

on:
  push:
    branches: ["master"]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: deploy-static-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build pages bundle
        run: |
          mkdir -p _site
          cp -r surfaces/. _site/ 2>/dev/null || true
          mkdir -p _site/dream
          cp -r apps/lantern-garage/public/. _site/dream/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Lantern OS</title>
            <meta http-equiv="refresh" content="0;url=/lantern-os/dream/">
          </head>
          <body>
            <p>Redirecting to <a href="/lantern-os/dream/">Dream Journal</a>.</p>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

  smoke-test:
    name: Smoke Test Static Mirror
    needs: [deploy-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test static endpoints
        run: |
          python3 - << 'EOF'
          import sys
          import urllib.request

          urls = [
              "https://alex-place.github.io/lantern-os/",
              "https://alex-place.github.io/lantern-os/dream/",
          ]
          ok = 0
          for url in urls:
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      if response.status == 200:
                          print(f"OK {url}")
                          ok += 1
                      else:
                          print(f"WARN {url} status={response.status}")
              except Exception as error:
                  print(f"FAIL {url} {error}")
          if ok == 0:
              sys.exit(1)
          EOF
