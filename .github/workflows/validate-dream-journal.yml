name: Validate Dream Journal

on:
  push:
    branches: ["master"]
    paths:
      - "apps/lantern-garage/**"
      - "tests/test_dream_journal_*"
      - "tests/run-dream-journal-tests.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-dream-journal.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "apps/lantern-garage/**"
      - "tests/test_dream_journal_*"
      - "tests/run-dream-journal-tests.js"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: dream-journal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-validate:
    name: npm check and API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check server files
        run: npm run check

      - name: Run Dream Journal API tests
        run: npm run test:api
