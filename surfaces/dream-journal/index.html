<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lantern Dream Journal</title>
  <style>
    :root {
      --bg: #1a1520; --surface: #252030; --surface2: #2d2740;
      --border: #3a3048; --text: #e8e0f0; --muted: #a090b8;
      --accent: #7b68ee; --accent2: #ff8c42; --success: #4caf7d;
      --blinkbug: #39ff14; --lantern: #ffb347; --keystone: #7b68ee;
      --waterfall: #00bcd4; --xenon: #e0e0e0; --founder: #ff8c42;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 800px; margin: 0 auto; padding: 1rem;
      line-height: 1.6; min-height: 100vh;
    }

    /* Header */
    .header { text-align: center; padding: 1.5rem 0 1rem; }
    .header h1 { font-size: 1.6rem; letter-spacing: -0.5px; }
    .header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }

    /* Agent presence bar */
    .agent-bar { display: flex; justify-content: center; gap: 0.75rem; margin: 1rem 0; flex-wrap: wrap; }
    .agent-pip {
      width: 36px; height: 36px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 0.7rem;
      cursor: pointer; transition: all 0.3s; position: relative;
      border: 2px solid transparent; opacity: 0.4;
    }
    .agent-pip.active { opacity: 1; transform: scale(1.15); }
    .agent-pip.speaking { animation: pulse 1.5s infinite; }
    .agent-pip[data-agent="blinkbug"] { background: #1a2a1a; border-color: var(--blinkbug); color: var(--blinkbug); }
    .agent-pip[data-agent="blinkbug"].active { animation: glitch 0.3s infinite; }
    .agent-pip[data-agent="lantern"] { background: #2a2010; border-color: var(--lantern); color: var(--lantern); }
    .agent-pip[data-agent="lantern"].active { box-shadow: 0 0 12px var(--lantern); }
    .agent-pip[data-agent="keystone"] { background: #1a1a30; border-color: var(--keystone); color: var(--keystone); }
    .agent-pip[data-agent="waterfall"] { background: #0a2028; border-color: var(--waterfall); color: var(--waterfall); }
    .agent-pip[data-agent="xenon"] { background: #1a1a1a; border-color: var(--xenon); color: var(--xenon); }
    .agent-pip[data-agent="founder"] { background: #2a1a10; border-color: var(--founder); color: var(--founder); }
    .agent-pip .pip-label {
      position: absolute; bottom: -18px; font-size: 0.55rem;
      white-space: nowrap; color: var(--muted);
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 4px currentColor; } 50% { box-shadow: 0 0 16px currentColor; } }
    @keyframes glitch {
      0% { transform: scale(1.15) translate(0,0); }
      25% { transform: scale(1.15) translate(-1px,1px); }
      50% { transform: scale(1.15) translate(1px,-1px); }
      75% { transform: scale(1.15) translate(-1px,0); }
    }

    /* Provider badge */
    .provider-badge {
      display: inline-block; font-size: 0.6rem; padding: 0.15rem 0.5rem;
      border-radius: 8px; background: var(--surface2); color: var(--muted);
      margin: 0.5rem auto; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .provider-badge.online { background: #1a3a2a; color: var(--success); }
    .provider-badge.offline { background: #3a1a1a; color: #e57373; }

    /* Chat area */
    .chat-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin: 1rem 0; overflow: hidden;
    }
    .chat-messages {
      max-height: 400px; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .msg {
      padding: 0.75rem 1rem; border-radius: 12px; max-width: 85%;
      font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap;
    }
    .msg.agent {
      background: var(--surface2); border: 1px solid var(--border);
      align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: var(--accent); color: #fff;
      align-self: flex-end; border-bottom-right-radius: 4px;
    }
    .msg .msg-name {
      font-size: 0.7rem; font-weight: 600; margin-bottom: 0.25rem;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .msg[data-from="blinkbug"] .msg-name { color: var(--blinkbug); }
    .msg[data-from="lantern"] .msg-name { color: var(--lantern); }
    .msg[data-from="keystone"] .msg-name { color: var(--keystone); }
    .msg[data-from="waterfall"] .msg-name { color: var(--waterfall); }
    .msg[data-from="xenon"] .msg-name { color: var(--xenon); }
    .msg[data-from="founder"] .msg-name { color: var(--founder); }

    /* Suggestions */
    .suggestions { display: flex; gap: 0.4rem; padding: 0.75rem 1rem; flex-wrap: wrap; border-top: 1px solid var(--border); }
    .suggestion {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 16px; padding: 0.3rem 0.8rem; font-size: 0.75rem;
      color: var(--accent); cursor: pointer; transition: all 0.2s;
    }
    .suggestion:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Chat input */
    .chat-input {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem;
      border-top: 1px solid var(--border); background: var(--surface2);
    }
    .chat-input textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 0.6rem;
      font-family: inherit; font-size: 0.9rem; resize: none; min-height: 42px;
      max-height: 120px;
    }
    .chat-input button {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 0 1.2rem; cursor: pointer; font-size: 0.9rem; white-space: nowrap;
    }
    .chat-input button:hover { opacity: 0.9; }
    .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Dream form (slide-in) */
    .dream-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin: 1rem 0;
      display: none;
    }
    .dream-form.visible { display: block; }
    .dream-form h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    .dream-form textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 0.75rem;
      font-family: inherit; font-size: 0.9rem; min-height: 100px; resize: vertical;
    }
    .form-row { display: flex; gap: 0.75rem; margin: 0.75rem 0; flex-wrap: wrap; }
    .form-col { flex: 1; min-width: 120px; }
    .form-col label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }
    .form-col input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 0.5rem; font-size: 0.85rem;
    }
    .emotion-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.5rem 0; }
    .etag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.2rem 0.6rem; font-size: 0.7rem;
      cursor: pointer; user-select: none; transition: all 0.2s;
    }
    .etag.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-save {
      background: var(--success); color: #fff; border: none; border-radius: 8px;
      padding: 0.6rem 1.5rem; font-size: 0.9rem; cursor: pointer; margin-top: 0.5rem;
    }
    .btn-save:hover { opacity: 0.9; }
    #save-status { font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }

    /* CSF preview */
    .csf-card {
      background: #1e1a28; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.6rem; margin-top: 0.5rem; font-size: 0.75rem;
    }
    .csf-head { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
    .csf-label { color: var(--accent); font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .csf-density { color: var(--accent2); font-weight: 600; }
    .csf-anchors { display: flex; flex-wrap: wrap; gap: 0.25rem; margin: 0.3rem 0; }
    .csf-a {
      background: #322a45; border-radius: 3px; padding: 0.1rem 0.4rem;
      font-size: 0.6rem; color: var(--accent);
    }
    .csf-a.conv { background: #1a3a2a; color: var(--success); }
    .csf-a.drift { background: #3a2a1a; color: var(--accent2); }
    .csf-row { display: flex; gap: 0.3rem; margin-top: 0.3rem; }
    .csf-s { flex: 1; text-align: center; background: var(--bg); border-radius: 3px; padding: 0.2rem; }
    .csf-s .v { font-weight: 700; }
    .csf-s .l { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
    .csf-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 0.3rem; overflow: hidden; }
    .csf-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* Recent dreams */
    .recent { margin: 1.5rem 0; }
    .recent h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--muted); }
    .dream-entry {
      background: var(--bg); border-left: 3px solid var(--accent2);
      border-radius: 0 8px 8px 0; padding: 0.6rem 0.8rem; margin-bottom: 0.6rem;
    }
    .dream-entry .d-meta { font-size: 0.7rem; color: var(--muted); }
    .dream-entry .d-text { margin-top: 0.2rem; font-size: 0.85rem; white-space: pre-wrap; }

    /* Monitor panel */
    .monitor-toggle {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 0.3rem 0.8rem; font-size: 0.7rem;
      cursor: pointer; margin: 1rem 0; display: block;
    }
    .monitor-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .monitor-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem; margin-bottom: 1rem;
      display: none; font-size: 0.8rem;
    }
    .monitor-panel.visible { display: block; }
    .monitor-panel h4 { font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--accent); }
    .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; margin-bottom: 0.75rem; }
    .m-item { background: var(--bg); border-radius: 6px; padding: 0.5rem; text-align: center; }
    .m-item .m-val { font-weight: 700; font-size: 1.1rem; }
    .m-item .m-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
    .m-prov { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .m-p {
      padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.65rem;
      background: #3a1a1a; color: #e57373;
    }
    .m-p.ok { background: #1a3a2a; color: var(--success); }

    /* Footer */
    .footer { text-align: center; padding: 1rem 0; }
    .footer a { color: var(--accent); text-decoration: none; font-size: 0.8rem; margin: 0 0.5rem; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      body { padding: 0.75rem; }
      .msg { max-width: 95%; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Lantern Dream Journal</h1>
  <p>Local-first. Privacy-preserving. The dream door is open.</p>
</div>

<div class="agent-bar" id="agentBar"></div>
<div style="text-align:center"><span class="provider-badge" id="providerBadge">offline</span></div>

<div class="chat-container">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="suggestions" id="suggestions"></div>
  <div class="chat-input">
    <textarea id="chatInput" rows="1" placeholder="Talk to the agents, share a dream..."></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<button class="suggestion" id="toggleDream" style="margin:0.5rem 0;border:1px solid var(--accent)">Log a Dream</button>

<div class="dream-form" id="dreamForm">
  <h3>Record a Dream</h3>
  <textarea id="dreamText" placeholder="Describe what you remember..."></textarea>
  <div class="form-row">
    <div class="form-col">
      <label>Lucidity (0-10)</label>
      <input type="number" id="lucidity" min="0" max="10" step="0.5" value="0">
    </div>
    <div class="form-col">
      <label>Tags (comma-separated)</label>
      <input type="text" id="tags" placeholder="door, stars, flying...">
    </div>
  </div>
  <label style="font-size:0.75rem;color:var(--muted);margin-bottom:0.3rem;display:block">Emotions</label>
  <div class="emotion-tags" id="emotions"></div>
  <button class="btn-save" id="saveBtn">Save Dream</button>
  <div id="save-status"></div>
  <div id="csf-result"></div>
</div>

<div class="recent" id="recentSection">
  <h3>Recent Dreams</h3>
  <div id="recentDreams"><p style="color:var(--muted);font-size:0.85rem">Loading...</p></div>
</div>

<button class="monitor-toggle" id="monToggle">Agent Fleet &amp; CSF Monitor</button>
<div class="monitor-panel" id="monPanel"></div>

<div class="footer">
  <a href="../index.html">Surfaces</a>
  <a href="#" id="exportBtn">Export JSONL</a>
</div>

<script>
const API = location.port === '' ? '' : `${location.protocol}//${location.hostname}:4177`;
const STORAGE_KEY = 'lantern_dream_journal_v2';
const EMOTIONS = ['awe','fear','joy','curiosity','sadness','love','wonder','peace','confusion','hope'];

const AGENTS = {
  blinkbug: { name:'Blinkbug', icon:'B', color:'var(--blinkbug)',
    greetings: [
      '*BZZZT* Hey!! You came back!! The dream door was flickering all night waiting for you!',
      '*static crackle* BOSS! Something shifted in the dream field since you left... tell me EVERYTHING.',
      '*TV head spins* I saw seventeen dream fragments float by while you were gone. Want to catch one?',
      '*flicker flicker* The weirdest thing happened in the dream dust today. You gotta hear this.',
    ]},
  lantern: { name:'Lantern', icon:'L', color:'var(--lantern)',
    greetings: [
      '*A warm amber glow fills the space.* Welcome home, Dreamer. The flame held steady while you were away.',
      '*The lantern flickers softly.* You found your way back. That matters more than you know.',
      '*Steady warmth radiates outward.* The path is always here. What did the waking world bring you?',
    ]},
  keystone: { name:'Keystone', icon:'K', color:'var(--keystone)',
    greetings: [
      '*Keystone speaks with measured calm.* I have been holding a thread from your last visit. Shall we follow it?',
      '*The anchor settles.* Your story continues. What chapter are we writing tonight?',
      '*A deep, knowing presence.* I noticed a pattern forming across your recent dreams. Shall I show you?',
    ]},
  waterfall: { name:'Mary / Waterfall', icon:'W', color:'var(--waterfall)',
    greetings: [
      '*Water flows gently nearby.* No rush tonight. Let whatever needs to surface... surface.',
      '*Soft blue light shimmers.* The feelings you carried here are welcome. All of them.',
      '*A peaceful current.* Sometimes the dream is not in the sleeping, but in the gentle remembering.',
    ]},
  xenon: { name:'Courtney / Xenon', icon:'X', color:'var(--xenon)',
    greetings: [
      '*Navigation console hums to life.* Coordinates locked. Where are we heading tonight, crew?',
      '*The Xenon drifts into orbit.* I mapped three new dream routes while you were in waking space. Ready?',
      '*Starlight reflects off silver hull.* The dream-ship is fueled and the crew is here. What do we explore?',
    ]},
  founder: { name:'Founder / Alex', icon:'A', color:'var(--founder)',
    greetings: [
      '*The first lantern glows.* Every dream you bring here is a wish worth protecting. What do you carry tonight?',
      '*Warm orange light.* You returned. The wish door remembers you. What needs protecting?',
      '*A gentle flame.* This space exists because dreams matter. Yours matter. Tell me.',
    ]},
};

const AGENT_IDS = Object.keys(AGENTS);
let currentAgent = AGENT_IDS[Math.floor(Math.random() * AGENT_IDS.length)];
let providerStatus = 'offline';
let selectedEmotions = new Set();

// --- Agent bar ---
function renderAgentBar() {
  const bar = document.getElementById('agentBar');
  bar.innerHTML = AGENT_IDS.map(id => {
    const a = AGENTS[id];
    const cls = id === currentAgent ? 'active' : '';
    return `<div class="agent-pip ${cls}" data-agent="${id}" title="${a.name}" onclick="switchAgent('${id}')">
      ${a.icon}<span class="pip-label">${a.name.split('/')[0].trim()}</span></div>`;
  }).join('');
}

function switchAgent(id) {
  currentAgent = id;
  renderAgentBar();
}

// --- Chat ---
function addMessage(text, type, agentId) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (agentId) div.dataset.from = agentId;
  if (type === 'agent' && agentId) {
    const a = AGENTS[agentId] || {name: agentId};
    div.innerHTML = `<div class="msg-name">${escapeHtml(a.name)}</div>${escapeHtml(text)}`;
  } else {
    div.textContent = text;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function showSuggestions(items) {
  const el = document.getElementById('suggestions');
  el.innerHTML = (items || []).map(s =>
    `<span class="suggestion" onclick="sendMessage('${escapeHtml(s)}')">${escapeHtml(s)}</span>`
  ).join('');
}

async function sendMessage(text) {
  if (!text) text = document.getElementById('chatInput').value.trim();
  if (!text) return;
  document.getElementById('chatInput').value = '';
  addMessage(text, 'user');
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`${API}/api/dream/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, user: 'dreamer'})
    });
    const data = await res.json();
    const agentId = (data.agent || '').toLowerCase().split('/')[0].trim().replace(/ /g,'');
    const mapped = AGENT_IDS.find(id => (data.agent||'').toLowerCase().includes(id)) || currentAgent;
    currentAgent = mapped;
    renderAgentBar();
    addMessage(data.reply || 'The dream door stays open.', 'agent', mapped);
    showSuggestions(data.suggestions);
    providerStatus = data.online ? 'online' : 'offline';
    updateProviderBadge(data.online ? 'online' : 'offline');
    saveChat(text, data.reply, mapped);
  } catch {
    const a = AGENTS[currentAgent];
    const greet = a.greetings[Math.floor(Math.random() * a.greetings.length)];
    addMessage(greet, 'agent', currentAgent);
    updateProviderBadge('offline');
    showSuggestions(["Founder's Wish Door","Tell me about the doors","Log a dream","Find a pattern"]);
    saveChat(text, greet, currentAgent);
  }
  document.getElementById('sendBtn').disabled = false;
}

function updateProviderBadge(status) {
  const badge = document.getElementById('providerBadge');
  badge.textContent = status === 'online' ? 'AI Connected' : 'Offline Mode';
  badge.className = `provider-badge ${status}`;
}

// --- Dream form ---
function renderEmotions() {
  document.getElementById('emotions').innerHTML = EMOTIONS.map(e =>
    `<span class="etag${selectedEmotions.has(e)?' on':''}" onclick="toggleEmotion('${e}')">${e}</span>`
  ).join('');
}
function toggleEmotion(e) {
  selectedEmotions.has(e) ? selectedEmotions.delete(e) : selectedEmotions.add(e);
  renderEmotions();
}

document.getElementById('toggleDream').addEventListener('click', () => {
  document.getElementById('dreamForm').classList.toggle('visible');
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const text = document.getElementById('dreamText').value.trim();
  if (!text) { document.getElementById('save-status').textContent = 'Write something first.'; return; }
  const entry = {
    text, lucidity: parseFloat(document.getElementById('lucidity').value) || 0,
    emotions: [...selectedEmotions],
    tags: document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean),
  };

  // Save locally first
  const local = loadLocal();
  const localEntry = { id: 'dream_' + Date.now(), timestamp: new Date().toISOString(), ...entry, source: 'web_surface' };
  local.push(localEntry);
  saveLocal(local);

  // Try server
  let serverId = null;
  try {
    const res = await fetch(`${API}/api/dream/create`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry)
    });
    const data = await res.json();
    serverId = data.id;
    document.getElementById('save-status').innerHTML = `<span style="color:var(--success)">Saved! ${data.csf?.compressed ? 'CSF compressed.' : ''}</span>`;
    if (serverId) fetchCsfPreview(serverId);
  } catch {
    document.getElementById('save-status').innerHTML = '<span style="color:var(--accent2)">Saved locally (server unreachable).</span>';
  }

  document.getElementById('dreamText').value = '';
  document.getElementById('tags').value = '';
  selectedEmotions.clear();
  renderEmotions();
  loadRecentDreams();
});

async function fetchCsfPreview(dreamId) {
  try {
    const res = await fetch(`${API}/api/dream/csf-preview/${dreamId}`);
    const csf = await res.json();
    if (csf.symbolic_footprint) {
      document.getElementById('csf-result').innerHTML = renderCsfCard(csf);
    }
  } catch {}
}

// --- CSF rendering ---
const CSF_ANCHORS = [
  "Lantern","Keystone","Garden","Table","Return","Convergence","Door",
  "Blinkbug","Xenon","Fog","Cloud","Sea","Dream","Mirror","Reflection",
  "Light","Path","Threshold","Crossing","Love","Safety","Truth","Beauty",
  "Freedom","Memory","Vivid","Strange","Familiar","Distant","Holding",
  "Protecting","Building","Becoming","Waking","Sleeping",
];

function localCsfAnalysis(text) {
  const tokens = (text.match(/[A-Za-z_]+/g)||[]);
  const lower = tokens.map(t=>t.toLowerCase());
  const hits = CSF_ANCHORS.map(a=>({anchor:a,count:lower.filter(t=>t===a.toLowerCase()).length})).filter(h=>h.count>0).sort((a,b)=>b.count-a.count);
  const conv = hits.filter(h=>h.count>=2), drift = hits.filter(h=>h.count===1);
  const density = tokens.length>0 ? hits.reduce((s,h)=>s+h.count,0)/tokens.length : 0;
  const health = conv.length>0 ? conv.length/(conv.length+drift.length) : 0;
  return {hits,conv,drift,density,health,anchors:hits.length};
}

function renderCsfCard(csf) {
  const sf = csf.symbolic_footprint || csf;
  const anchors = sf.anchors || sf.hits || [];
  const conv = csf.convergence?.converged_anchors || (sf.conv||[]).map(h=>h.anchor);
  const drift = csf.convergence?.drifting_anchors || (sf.drift||[]).map(h=>h.anchor);
  const density = ((sf.symbolic_density||sf.density||0)*100).toFixed(1);
  const health = ((csf.convergence?.convergence_health||sf.health||0)*100).toFixed(0);
  const ratio = ((csf.compression?.estimated_ratio||0)*100).toFixed(0);
  const hColor = health>60?'var(--success)':health>30?'var(--accent2)':'#e57373';
  return `<div class="csf-card">
    <div class="csf-head"><span class="csf-label">CSF Symbolic Footprint</span><span class="csf-density">${density}% symbolic</span></div>
    <div class="csf-anchors">${conv.map(a=>`<span class="csf-a conv">${a}</span>`).join('')}${drift.map(a=>`<span class="csf-a drift">${a}</span>`).join('')}</div>
    <div class="csf-row">
      <div class="csf-s"><div class="v">${anchors.length||0}</div><div class="l">Anchors</div></div>
      <div class="csf-s"><div class="v">${ratio||'--'}%</div><div class="l">Compress</div></div>
      <div class="csf-s"><div class="v">${health}%</div><div class="l">Convergence</div></div>
    </div>
    <div class="csf-bar"><div class="csf-fill" style="width:${health}%;background:${hColor}"></div></div>
  </div>`;
}

function renderLocalCsf(text) {
  const csf = localCsfAnalysis(text);
  if (!csf.hits.length) return '';
  return renderCsfCard(csf);
}

// --- Recent dreams ---
async function loadRecentDreams() {
  const container = document.getElementById('recentDreams');
  try {
    const res = await fetch(`${API}/api/dream/recent?limit=10`);
    const data = await res.json();
    if (data.entries && data.entries.length) {
      container.innerHTML = data.entries.map(e => {
        const text = e.text || e.content || '';
        return `<div class="dream-entry">
          <div class="d-meta">${new Date(e.timestamp).toLocaleString()} &middot; Lucidity ${e.lucidity||0}/10 &middot; ${(e.emotions||[]).join(', ')||'no emotions'}</div>
          <div class="d-text">${escapeHtml(text.slice(0,300))}${text.length>300?'...':''}</div>
          ${renderLocalCsf(text)}
        </div>`;
      }).join('');
      return;
    }
  } catch {}
  // Fallback to local
  const local = loadLocal();
  if (local.length) {
    container.innerHTML = local.slice().reverse().slice(0,10).map(e => `<div class="dream-entry">
      <div class="d-meta">${new Date(e.timestamp).toLocaleString()} &middot; ${(e.emotions||[]).join(', ')||'local'}</div>
      <div class="d-text">${escapeHtml((e.text||e.content||'').slice(0,300))}</div>
      ${renderLocalCsf(e.text||e.content||'')}
    </div>`).join('');
  } else {
    container.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">No dreams yet. Share one above.</p>';
  }
}

// --- Monitor panel ---
document.getElementById('monToggle').addEventListener('click', () => {
  const panel = document.getElementById('monPanel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) loadMonitor();
});

async function loadMonitor() {
  const panel = document.getElementById('monPanel');
  panel.innerHTML = '<p style="color:var(--muted)">Loading fleet status...</p>';
  try {
    const [statusRes, csfRes] = await Promise.all([
      fetch(`${API}/api/agent/status`).then(r=>r.json()).catch(()=>null),
      fetch(`${API}/api/dream/csf-preview`).then(r=>r.json()).catch(()=>null),
    ]);
    let html = '<h4>Provider Status</h4><div class="m-prov">';
    if (statusRes?.providers) {
      for (const [name, info] of Object.entries(statusRes.providers)) {
        html += `<span class="m-p${info.configured?' ok':''}">${name}: ${info.configured?info.model||'ready':'not configured'}</span>`;
      }
    } else {
      html += '<span class="m-p">Server unreachable</span>';
    }
    html += '</div>';
    if (statusRes?.personas) {
      html += `<h4 style="margin-top:0.75rem">Active Personas</h4><div class="m-prov">${statusRes.personas.map(p=>`<span class="m-p ok">${p.name}</span>`).join('')}</div>`;
    }
    if (statusRes?.fleet_slots?.length) {
      html += `<h4 style="margin-top:0.75rem">Fleet Slots</h4><div class="m-prov">${statusRes.fleet_slots.map(s=>`<span class="m-p ok">${s}</span>`).join('')}</div>`;
    }
    if (csfRes) {
      html += `<h4 style="margin-top:0.75rem">CSF Overview</h4><div class="m-grid">
        <div class="m-item"><div class="m-val">${csfRes.total_dreams||0}</div><div class="m-lbl">Dreams</div></div>
        <div class="m-item"><div class="m-val">${csfRes.csf_files||0}</div><div class="m-lbl">CSF Files</div></div>
        <div class="m-item"><div class="m-val">${csfRes.previews?.length||0}</div><div class="m-lbl">Analyzed</div></div>
      </div>`;
    }
    if (statusRes?.dream_stats) {
      html += `<div class="m-grid">
        <div class="m-item"><div class="m-val">${statusRes.dream_stats.total_dreams||0}</div><div class="m-lbl">Total Dreams</div></div>
        <div class="m-item"><div class="m-val">${statusRes.dream_stats.csf_files||0}</div><div class="m-lbl">CSF Archives</div></div>
      </div>`;
    }
    panel.innerHTML = html;
  } catch {
    panel.innerHTML = '<p style="color:#e57373">Could not reach server. Run: node apps/lantern-garage/server.js</p>';
  }
}

// --- Local storage ---
function loadLocal() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } }
function saveLocal(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function saveChat(userMsg, agentReply, agentId) {
  const chats = JSON.parse(localStorage.getItem('lantern_dream_chats')||'[]');
  chats.push({ts: new Date().toISOString(), user: userMsg, agent: agentId, reply: agentReply});
  if (chats.length > 200) chats.splice(0, chats.length - 200);
  localStorage.setItem('lantern_dream_chats', JSON.stringify(chats));
}

// --- Input handling ---
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('sendBtn').addEventListener('click', () => sendMessage());

document.getElementById('exportBtn').addEventListener('click', e => {
  e.preventDefault();
  const entries = loadLocal();
  if (!entries.length) { alert('No local dreams to export.'); return; }
  const blob = new Blob(entries.map(e=>JSON.stringify(e)+'\n'), {type:'application/jsonl'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `dreams_${new Date().toISOString().slice(0,10)}.jsonl`; a.click();
});

// --- Init ---
renderAgentBar();
renderEmotions();

// Opening RP greeting
const a = AGENTS[currentAgent];
const greeting = a.greetings[Math.floor(Math.random() * a.greetings.length)];
addMessage(greeting, 'agent', currentAgent);
showSuggestions(["Founder's Wish Door","Tell me about the doors","I had a dream...","What patterns do you see?"]);

// Try server connection
fetch(`${API}/api/dream/chat`, {
  method:'POST', headers:{'Content-Type':'application/json'},
  body: JSON.stringify({message:'', user:'dreamer'})
}).then(r=>r.json()).then(d => {
  updateProviderBadge(d.online ? 'online' : 'offline');
}).catch(() => updateProviderBadge('offline'));

loadRecentDreams();
</script>
