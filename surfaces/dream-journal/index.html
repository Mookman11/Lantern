<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lantern Dream Journal</title>
  <style>
    :root {
      --bg: #1a1520;
      --surface: #252030;
      --border: #3a3048;
      --text: #e8e0f0;
      --muted: #a090b8;
      --accent: #7b68ee;
      --accent2: #ff8c42;
      --success: #4caf7d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
      line-height: 1.6;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { margin: 0; font-size: 1.75rem; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin: 0.25rem 0 0; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; }
    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.75rem;
      font-size: 1rem;
      font-family: inherit;
    }
    textarea { min-height: 140px; resize: vertical; }
    .row { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .col { flex: 1; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .tag {
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }
    .tag.active { background: var(--accent); border-color: var(--accent); }
    .tag:hover { border-color: var(--accent); }

    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button.primary:hover { opacity: 0.9; }

    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    #status { margin-top: 0.75rem; font-size: 0.9rem; min-height: 1.4rem; }
    #status.ok { color: var(--success); }
    #status.err { color: #e57373; }

    .recent { margin-top: 1.5rem; }
    .recent h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
    .entry {
      background: var(--bg);
      border-left: 3px solid var(--accent2);
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
    }
    .entry .meta { font-size: 0.8rem; color: var(--muted); }
    .entry .content { margin-top: 0.25rem; white-space: pre-wrap; }

    .csf-preview {
      background: #1e1a28;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
    }
    .csf-preview .csf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .csf-preview .csf-label {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .csf-preview .csf-density {
      color: var(--accent2);
      font-weight: 600;
    }
    .csf-anchors {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin: 0.4rem 0;
    }
    .csf-anchor {
      background: #322a45;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.7rem;
      color: var(--accent);
    }
    .csf-anchor.converged {
      background: #1a3a2a;
      color: var(--success);
    }
    .csf-anchor.drifting {
      background: #3a2a1a;
      color: var(--accent2);
    }
    .csf-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .csf-stat {
      text-align: center;
      background: #1a1520;
      border-radius: 4px;
      padding: 0.3rem;
    }
    .csf-stat .val {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .csf-stat .lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
    }
    .csf-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 0.4rem;
      overflow: hidden;
    }
    .csf-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .csf-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .csf-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .actions a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .actions a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Lantern Dream Journal</h1>
    <p>Local-first. Privacy-preserving. Append-only.</p>
  </header>

  <div class="card">
    <label for="dreamText">Dream</label>
    <textarea id="dreamText" placeholder="Describe what you remember..."></textarea>
    <p class="hint">Tip: Include symbols, places, characters, and how it felt.</p>
  </div>

  <div class="card">
    <div class="row">
      <div class="col">
        <label for="lucidity">Lucidity (0-10)</label>
        <input id="lucidity" type="number" min="0" max="10" step="0.5" value="0">
      </div>
      <div class="col">
        <label>Emotions</label>
        <div class="tag-list" id="emotions">
          <span class="tag" data-val="awe">awe</span>
          <span class="tag" data-val="fear">fear</span>
          <span class="tag" data-val="joy">joy</span>
          <span class="tag" data-val="curiosity">curiosity</span>
          <span class="tag" data-val="sadness">sadness</span>
          <span class="tag" data-val="love">love</span>
        </div>
      </div>
    </div>
    <label for="tags">Tags (comma-separated)</label>
    <input id="tags" type="text" placeholder="door, river, stars, flying...">
    <label for="goals" style="margin-top:0.75rem">Linked Goals</label>
    <input id="goals" type="text" placeholder="lantern-revenue, spain-route...">
  </div>

  <button class="primary" id="saveBtn">Save to Notebook</button>
  <div id="status"></div>

  <div class="recent">
    <h2>Recent Dreams</h2>
    <div id="entries"></div>
  </div>

  <div class="actions">
    <a href="../index.html">Back to Surfaces</a>
    <a href="#" id="exportBtn">Export JSONL</a>
    <a href="#" id="mirrorBtn">Generate Mirror Prompt</a>
  </div>

  <script>
    const STORAGE_KEY = 'lantern_dream_journal_v1';

    function loadEntries() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }
    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }
    function render() {
      const entries = loadEntries();
      const container = document.getElementById('entries');
      container.innerHTML = entries.slice().reverse().map(e => `
        <div class="entry">
          <div class="meta">${new Date(e.timestamp).toLocaleString()} &middot; Lucidity ${e.lucidity}/10 &middot; ${(e.emotions||[]).join(', ')||'no emotions tagged'}</div>
          <div class="content">${escapeHtml(e.content)}</div>
        </div>
      `).join('');
    }
    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    document.querySelectorAll('#emotions .tag').forEach(tag => {
      tag.addEventListener('click', () => tag.classList.toggle('active'));
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const content = document.getElementById('dreamText').value.trim();
      if (!content) {
        const s = document.getElementById('status');
        s.textContent = 'Write something first.'; s.className = 'err';
        return;
      }
      const emotions = [...document.querySelectorAll('#emotions .tag.active')].map(t => t.dataset.val);
      const entry = {
        id: 'dream_' + Date.now(),
        timestamp: new Date().toISOString(),
        content,
        lucidity: parseFloat(document.getElementById('lucidity').value) || 0,
        emotions,
        tags: document.getElementById('tags').value.split(',').map(s => s.trim()).filter(Boolean),
        linked_goals: document.getElementById('goals').value.split(',').map(s => s.trim()).filter(Boolean),
        source: 'web_surface',
      };
      const entries = loadEntries();
      entries.push(entry);
      saveEntries(entries);
      render();
      document.getElementById('dreamText').value = '';
      document.getElementById('tags').value = '';
      document.getElementById('goals').value = '';
      document.querySelectorAll('#emotions .tag').forEach(t => t.classList.remove('active'));
      const s = document.getElementById('status');
      s.textContent = 'Dream saved locally.'; s.className = 'ok';
      setTimeout(() => { s.textContent = ''; s.className = ''; }, 3000);
    });

    document.getElementById('exportBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const entries = loadEntries();
      const blob = new Blob(entries.map(e => JSON.stringify(e) + '\n'), { type: 'application/jsonl' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `dreams_${new Date().toISOString().slice(0,7)}.jsonl`;
      a.click();
    });

    document.getElementById('mirrorBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const entries = loadEntries();
      if (!entries.length) { alert('No dreams to mirror yet.'); return; }
      const ids = entries.map(e => e.id).slice(-10);
      const prompt = `Mirror of ${ids.length} recent dream facets:\n\n` +
        entries.slice(-5).map(e => `- ${e.content.slice(0, 120)}...`).join('\n') +
        `\n\nAnalyze recurring symbols, emotional arcs, and waking-life connections. Be honest about what is uncertain.`;
      navigator.clipboard.writeText(prompt).then(() => alert('Mirror prompt copied to clipboard.'));
    });

    // --- CSF Symbolic Preview ---
    const CSF_BUILTIN_ANCHORS = [
      "Lantern", "Keystone", "Garden", "Table", "Return", "Convergence",
      "CityOfDoors", "Sigil", "Founder", "Wish", "Anchor", "Door",
      "Blinkbug", "Gage", "Xenon", "Fog", "Cloud", "Sea", "Dream",
      "Mirror", "Reflection", "Light", "Path", "Threshold", "Crossing",
      "Love", "Safety", "Truth", "Beauty", "Freedom", "Memory",
      "Vivid", "Strange", "Familiar", "Distant", "Near", "Holding",
      "Protecting", "Building", "Becoming", "Waking", "Sleeping",
    ];

    function analyzeCsf(text) {
      const tokens = (text.match(/[A-Za-z_]+/g) || []);
      const lower = tokens.map(t => t.toLowerCase());
      const unique = [...new Set(tokens)];
      const anchorLower = CSF_BUILTIN_ANCHORS.map(a => a.toLowerCase());
      const hits = CSF_BUILTIN_ANCHORS
        .map(a => ({ anchor: a, count: lower.filter(t => t === a.toLowerCase()).length }))
        .filter(h => h.count > 0)
        .sort((a, b) => b.count - a.count);
      const converged = hits.filter(h => h.count >= 2);
      const drifting = hits.filter(h => h.count === 1);
      const anchorCount = hits.reduce((s, h) => s + h.count, 0);
      const density = tokens.length > 0 ? anchorCount / tokens.length : 0;
      const freq = {};
      for (const t of tokens) freq[t] = (freq[t] || 0) + 1;
      const repeated = Object.values(freq).filter(c => c >= 2).length;
      const ratio = Math.min(0.95, (hits.length * 0.02) + (repeated / Math.max(unique.length, 1)) * 0.5 + 0.15);
      const health = converged.length > 0 ? converged.length / (converged.length + drifting.length) : 0;
      return { tokens: tokens.length, unique: unique.length, hits, converged, drifting, density, ratio, health };
    }

    function renderCsfPreview(csf) {
      if (!csf.hits.length) return '';
      const healthPct = (csf.health * 100).toFixed(0);
      const densityPct = (csf.density * 100).toFixed(1);
      const ratioPct = (csf.ratio * 100).toFixed(0);
      const healthColor = csf.health > 0.6 ? 'var(--success)' : csf.health > 0.3 ? 'var(--accent2)' : '#e57373';
      return `
        <div class="csf-preview">
          <div class="csf-header">
            <span class="csf-label">CSF Symbolic Footprint</span>
            <span class="csf-density">${densityPct}% symbolic</span>
          </div>
          <div class="csf-anchors">
            ${csf.converged.map(h => `<span class="csf-anchor converged" title="Converged (${h.count}x)">${h.anchor}</span>`).join('')}
            ${csf.drifting.map(h => `<span class="csf-anchor drifting" title="Drifting (1x)">${h.anchor}</span>`).join('')}
          </div>
          <div class="csf-stats">
            <div class="csf-stat"><div class="val">${csf.hits.length}</div><div class="lbl">Anchors</div></div>
            <div class="csf-stat"><div class="val">${ratioPct}%</div><div class="lbl">Compress</div></div>
            <div class="csf-stat"><div class="val">${healthPct}%</div><div class="lbl">Convergence</div></div>
          </div>
          <div class="csf-bar"><div class="csf-bar-fill" style="width:${healthPct}%;background:${healthColor}"></div></div>
        </div>`;
    }

    // Override render to include CSF preview
    const _origRender = render;
    render = function() {
      const entries = loadEntries();
      const container = document.getElementById('entries');
      container.innerHTML = entries.slice().reverse().map(e => {
        const csf = analyzeCsf(e.content || '');
        return `
          <div class="entry">
            <div class="meta">${new Date(e.timestamp).toLocaleString()} &middot; Lucidity ${e.lucidity}/10 &middot; ${(e.emotions||[]).join(', ')||'no emotions tagged'}</div>
            <div class="content">${escapeHtml(e.content)}</div>
            ${renderCsfPreview(csf)}
          </div>`;
      }).join('');
    };
    render();
  </script>
</body>
</html>
