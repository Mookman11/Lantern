<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <link rel="manifest" href="/manifest.json">
  <title>Create — Lantern OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --surface2: #f1f3f5;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-dim: #cffafe;
      --accent-hover: #06b6d4;
      --green: #10b981;
      --gold: #f59e0b;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
      --radius: 14px;
    }

    [data-theme="dark"] {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2332;
      --border: #1f2937;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #06b6d4;
      --accent-dim: #164e63;
      --accent-hover: #0891b2;
      --green: #34d399;
      --gold: #fbbf24;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-hover: 0 4px 20px rgba(0,0,0,0.45);
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, -apple-system, sans-serif; font-size: 16px; line-height: 1.6; }

    .site-nav {
      position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 8px; padding: 0 20px;
      height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: 0 1px 0 var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.3px; margin-right: 8px; }
    .nav-brand .brand-icon { font-size: 18px; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 7px; transition: color 0.15s, background 0.15s; white-space: nowrap; }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--text); font-weight: 600; }
    @media (max-width: 580px) { .nav-links { display: none; } }
    .nav-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .nav-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 15px; transition: all 0.15s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-cta { font-size: 13px; font-weight: 600; padding: 7px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
    .nav-cta:hover { background: var(--accent-hover); }

    .page { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }

    .create-section { padding: 44px 0; }
    .create-section h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .create-section .sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; }

    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); }

    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: inherit; font-size: 0.95rem; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 120px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    .type-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .type-btn {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--muted);
      font-size: 0.9rem; cursor: pointer; transition: all 0.15s; font-weight: 500;
    }
    .type-btn:hover { border-color: var(--accent); color: var(--accent); }
    .type-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    .tag-input { display: flex; gap: 10px; }
    .tag-input input { flex: 1; }
    .tag-input button { padding: 11px 18px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.15s; }
    .tag-input button:hover { background: var(--border); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); color: var(--accent); border-radius: 14px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500; }
    .tag-badge button { background: none; border: none; color: inherit; cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; }

    .form-actions { display: flex; gap: 12px; margin-top: 32px; }
    .btn-primary { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 12px 20px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:hover { background: var(--border); }

    .notice { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
    .notice.success { display: block; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: var(--green); }
    .notice.error { display: block; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }

    .recent-section { margin-top: 48px; }
    .recent-section h2 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .recent-list { display: flex; flex-direction: column; gap: 10px; }
    .entry-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: all 0.15s;
    }
    .entry-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .entry-header { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }
    .entry-type { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--accent); letter-spacing: 0.08em; }
    .entry-date { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
    .entry-title { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .entry-text { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .entry-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .entry-tag { font-size: 0.7rem; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-weight: 500; }

    .site-footer { margin-top: 60px; padding: 20px 0; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 0.85rem; }
    .site-footer a { color: var(--muted); text-decoration: none; }
    .site-footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="/">
    <span class="brand-icon">◆</span> Lantern OS
  </a>
  <div class="nav-links">
    <a href="/dream-chat.html">Journal</a>
    <a href="/">Home</a>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" id="theme-toggle" title="Toggle light / dark mode">☀️</button>
  </div>
</nav>

<div class="page">
  <div class="create-section">
    <h1>Create Entry</h1>
    <p class="sub">Add to your dream journal. Videos, notes, projects, and memories — all saved locally.</p>

    <div id="notice" class="notice"></div>

    <div class="form-card">
      <!-- Type selector -->
      <div class="form-group">
        <label>Entry Type</label>
        <div class="type-buttons" id="type-buttons">
          <button type="button" class="type-btn active" data-kind="video">🎥 Video</button>
          <button type="button" class="type-btn" data-kind="note">📝 Note</button>
          <button type="button" class="type-btn" data-kind="project">📁 Project</button>
          <button type="button" class="type-btn" data-kind="highlight">⭐ Highlight</button>
          <button type="button" class="type-btn" data-kind="dream">💭 Dream</button>
        </div>
      </div>

      <!-- Title + Project -->
      <div class="form-row">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Give it a name..." maxlength="120">
        </div>
        <div class="form-group">
          <label for="project">Project / Collection</label>
          <input type="text" id="project" placeholder="e.g., Gaming Clips" maxlength="80">
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="text">Description</label>
        <textarea id="text" placeholder="Write what's on your mind. Any details, thoughts, or context..." maxlength="2000"></textarea>
      </div>

      <!-- Tags -->
      <div class="form-group">
        <label>Tags (optional)</label>
        <div class="tag-input">
          <input type="text" id="tag-input" placeholder="Add a tag and press Enter..." maxlength="40">
          <button type="button" id="add-tag-btn">Add Tag</button>
        </div>
        <div class="tag-list" id="tag-list"></div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="window.location='/'">Cancel</button>
        <button type="button" class="btn-primary" id="save-btn">Save Entry</button>
      </div>
    </div>

    <!-- Recent entries -->
    <div class="recent-section">
      <h2>Recent entries</h2>
      <div class="recent-list" id="recent-list">
        <p style="color: var(--muted); font-size: 0.85rem;">Loading your entries...</p>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <p><strong>Lantern OS</strong> · <a href="/">Home</a> · <a href="/dream-chat.html">Journal</a> · All data saved locally</p>
</footer>

<script src="/js/theme-toggle.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const themeToggle = document.getElementById('theme-toggle');
  if (themeToggle && window.toggleTheme) themeToggle.addEventListener('click', toggleTheme);
});

(function() {
  let selectedType = 'video';
  const tags = [];

  // Type buttons
  document.getElementById('type-buttons').addEventListener('click', e => {
    const btn = e.target.closest('.type-btn');
    if (!btn) return;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.kind;
  });

  // Tag management
  function renderTags() {
    document.getElementById('tag-list').innerHTML = tags.map((t, i) =>
      `<span class="tag-badge">${t}<button type="button" onclick="removeTag(${i})">×</button></span>`
    ).join('');
  }
  window.removeTag = function(i) { tags.splice(i, 1); renderTags(); };

  function addTag() {
    const input = document.getElementById('tag-input');
    const val = input.value.trim().toLowerCase().replace(/[^a-z0-9-_ ]/g, '').slice(0, 40);
    if (val && !tags.includes(val) && tags.length < 10) { tags.push(val); renderTags(); }
    input.value = '';
  }
  document.getElementById('add-tag-btn').addEventListener('click', addTag);
  document.getElementById('tag-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addTag(); }
  });

  // Notifications
  function showNotice(msg, type) {
    const el = document.getElementById('notice');
    el.textContent = msg;
    el.className = 'notice ' + (type === 'success' ? 'success' : 'error');
    if (type === 'success') setTimeout(() => { el.className = 'notice'; }, 3500);
  }

  // Save entry
  document.getElementById('save-btn').addEventListener('click', async () => {
    const title = document.getElementById('title').value.trim();
    const text = document.getElementById('text').value.trim();
    const project = document.getElementById('project').value.trim();

    if (!title && !text) { showNotice('Add a title or description.', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const res = await fetch('/api/dreamer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user: 'dreamer',
          kind: selectedType,
          name: title || text.slice(0, 80),
          text: [text, project ? `Project: ${project}` : ''].filter(Boolean).join('\n').trim(),
          tags,
        }),
      });
      const json = await res.json();
      if (!res.ok || json.error) throw new Error(json.error || 'Save failed');

      showNotice('✓ Entry saved to your notebook.', 'success');
      document.getElementById('title').value = '';
      document.getElementById('text').value = '';
      document.getElementById('project').value = '';
      tags.length = 0;
      renderTags();
      loadRecent();
    } catch (err) {
      showNotice(`Error: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Entry';
    }
  });

  // Load recent
  async function loadRecent() {
    const list = document.getElementById('recent-list');
    try {
      const res = await fetch('/api/dreamer?user=dreamer', { cache: 'no-store' });
      if (!res.ok) throw new Error('');
      const data = await res.json();
      const entries = (data.entries || []).slice(-8).reverse();
      if (!entries.length) { list.innerHTML = '<p style="color: var(--muted); font-size: 0.85rem;">No entries yet. Start creating!</p>'; return; }

      const fmt = iso => {
        try { return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }
        catch { return iso; }
      };

      list.innerHTML = entries.map(e => `
        <div class="entry-card">
          <div class="entry-header">
            <span class="entry-type">${e.kind || 'note'}</span>
            <span class="entry-date">${fmt(e.recordedAt)}</span>
          </div>
          ${e.name ? `<div class="entry-title">${e.name}</div>` : ''}
          ${e.text ? `<div class="entry-text">${e.text.slice(0, 140)}${e.text.length > 140 ? '...' : ''}</div>` : ''}
          ${e.tags?.length ? `<div class="entry-tags">${e.tags.map(t => `<span class="entry-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
    } catch {
      list.innerHTML = '<p style="color: var(--muted); font-size: 0.85rem;">Could not load entries. Is the server running?</p>';
    }
  }

  loadRecent();
})();
</script>
</body>
</html>
